<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Interface</title>
</head>
<body>
    <h1>Admin Interface</h1>
    <section>
        <h2>Add/Edit Ailments</h2>
        <form id="ailmentForm">
            <input type="text" id="ailmentName" placeholder="Ailment Name" required>
            <textarea id="ailmentDescription" placeholder="Description" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </section>
    <section>
        <h2>Add/Edit Spiritual Meanings</h2>
        <form id="spiritualMeaningForm">
            <input type="text" id="spiritualMeaningName" placeholder="Spiritual Meaning" required>
            <textarea id="spiritualMeaningDescription" placeholder="Description" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </section>
</body>
</html>
